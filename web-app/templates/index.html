<html>

		  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">

  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
    integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">

  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='styles/styles.css') }}">

		<link rel="stylesheet" href="fonts/linearicons/style.css">
		
		<!-- STYLE CSS -->
		<link rel="stylesheet" href="css/style.css">
	</head>

	<body>
	  <div class="topnav" id="myTopnav">
    <a class="active" href="https://autoai.dadberg.com"><i class="fa fa-fw fa-home"></i> Home</a>
    <a href="https://www.dadberg.com/contact"><i class="fa fa-fw fa-envelope"></i> Contact</a>
    <a href="https://www.linkedin.com/in/dadberg"><i class="fa fa-info-circle"></i> About</a>
  </div>

		<div class="wrapper">
			<div class="inner">
				<img src="images/image-1.png" alt="" class="image-1">
				
				<form class="text-center" method="POST" action="/results">
					<h3>Breast Cancer Prediction</h3>
					<div class="form-holder">
						<span class="lnr lnr-user"></span>
						<input type="text" class="form-control" placeholder="Mean Radius">{{ form.mean_radius }}</div>
					<div class="form-holder">
						<span class="lnr lnr-user"></span>
						<input type="text" class="form-control" placeholder="Mean Texture">{{ form.mean_texture }}</div>
					<div class="form-holder">
						<span class="lnr lnr-user"></span>
						<input type="text" class="form-control" placeholder="Mean Perimeter">{{ form.mean_perimeter }}</div>
					<div class="form-holder">
						<span class="lnr lnr-user"></span>
						<input type="text" class="form-control" placeholder="Mean Area">{{ form.mean_area }}</div>
					<div class="form-holder">
						<span class="lnr lnr-user"></span>
						<input type="text" class="form-control" placeholder="Mean Smoothness">{{ form.mean_smoothness }}</div>
					<button id="submit" style="margin-bottom: 10px;" name="submit" type="submit" onclick="startSpinner()" value="Predict">
						<span>Predict</span>
					</button>
					  <div style="padding-top:5px" class="d-flex justify-content-center">
    <div id="loader" style="color:black; display: none;" class="spinner-border"></div>
  </div>
  <div class="output-container" style="padding:10px">
    <center>
      <div id="output">
        <h5 id="a">{{ form.title }}</h5>
        <h3 id="b" style="color:green;">{{ form.outcome }}</h3>
        <h3 id="b" style="color:red;">{{ form.outcomes }}</h3>
        <h4 id="r" style="color:red;"></h3>
      </div>
    </center>
  </div>
				</form>

				<img src="images/image-2.png" alt="" class="image-2">
			</div>
			
		</div>
		
		  <script>
window.onload = function exampleFunction() { 
  
  // var output = document.getElementById("output");
  // output.style.display = "none"
} 

    function startSpinner() {
      var x = document.getElementById("loader");
      x.style.display = "block";
      var output = document.getElementById("output");
      output.style.display = "none"
      setTimeout(function () {
        var y = document.getElementById("output");
        var x = document.getElementById("loader");
        var a = document.getElementById("a");
        var b = document.getElementById("b");
        x.style.display = "none";
        y.style.display = "block"
        a.style.display = "block"
        b.style.display = "block"
      }, 3000);

    }
  </script>
		<script src="js/jquery-3.3.1.min.js"></script>
		<script src="js/main.js"></script>
